<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Get Unkit first-drop access</title>
  <meta name="description" content="Join the Unkit early access list." />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/" aria-label="Unkit home">
      <span class="logo-mark">u</span>
      <span class="logo-text">unkit</span>
    </a>
  </header>

  <main class="simple-page">
    <section class="capture-card">
      <p class="eyebrow">You’re early</p>
      <h1>We’re finalizing our first drop.</h1>
      <p>Want first access and a launch discount? Drop your email and we’ll send it when Unkit is ready.</p>

      <!-- SIMPLE VERSION: replace the action URL below with your email platform form URL. -->
      <form class="email-form" action="/thanks/">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />

        <label for="zip">Zip code</label>
        <input id="zip" name="zip" type="text" inputmode="numeric" placeholder="03766" />

        <button class="button primary full-width" type="submit">Get first-drop access</button>
      </form>

      <p class="microcopy centered">No spam. Just first-drop updates and launch pricing.</p>
    </section>
  </main>
</body>
</html>
